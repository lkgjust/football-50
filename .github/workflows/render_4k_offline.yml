name: Render 4K Offline Marble Race

on:
  workflow_dispatch: # Is-se aapko manual Run button milega

jobs:
  render-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          pip install pymunk opencv-python pillow numpy

      - name: Run offline 4K physics render
        run: |
          python github_actions_offline_4k_renderer.py

      - name: Upload pristine 4K video to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beat-the-keeper-4k-video
          path: beat_the_keeper_final_video.mp4
          retention-days: 7
