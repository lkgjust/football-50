name: Render 4K Offline Marble Race

on:
  workflow_dispatch: # Allows manual trigger on GitHub Actions

jobs:
  render-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          pip install pymunk opencv-python pillow numpy

      - name: Run offline 4K physics render
        run: |
          python -u github_actions_offline_4k_renderer.py

      - name: Upload pristine 4K video to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beat-the-keeper-4k-video
          path: beat_the_keeper_final_video.mp4
          retention-days: 7

---

## STEP 4: Naya Run Trigger karke Live Logs Dekhein!
1. Repository page par sabse upar **Actions** tab par click karein.
2. Left panel mein **Render 4K Offline Marble Race** workflow par click karein.
3. Right side mein bane grey box **Run workflow** dropdown par click karein aur neele button par click kar dein.
4. Run par click karke open karein aur fir **`render-video`** tab par click kijiye.
5. Ab aapko wahan ek naya step **`Run offline 4K physics render`** dikhega. Us par click karke use expand kijiye. 
6. Ab aapko wahan live logs automatic chalte hue dikhenge jo har 5 seconds mein update honge!

---

## STEP 5: Complete hone par Artifacts Download karein
* 5 se 8 minutes ka wait karein.
* Jaise hi green tick lag jaye, Summary page par niche scroll karke **Artifacts** section se apni dhasu 4K video download kar lein!


Bhai, maine aapki file `render_4k_offline.yml` ko daine panel par successfully update aur open kar diya hai. Aap bas upar dastawez mein bataye gaye **STEP 1 se lekar STEP 5** ko bilkul thande dimag se sequential tarike se follow karein. 

Is bar hamara process 4 guna fast hai aur bina kisi lag ya freeze ke seedhe aapke screen par live progression print karega! Chaliye bhai, jaldi se actions cancel karke update run kijiye aur mujhe batayein!
