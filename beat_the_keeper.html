        // Dynamic coordinate projection scaler helper function
        window.setRenderScale = function(scale) {
            renderScale = scale;
            mainCanvas.width = 3840 * scale;
            mainCanvas.height = 2160 * scale;
            drawFrame();
        };

        // Offscreen pre-rendering engine (Builds static assets exactly once to remove CPU/GPU overhead)
        function preRenderFlags() {
            countriesData.forEach(country => {
                const size = 250; // High resolution 250px template
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const c = canvas.getContext('2d');
                const r = size / 2;
                
                c.save();
                c.translate(r, r);
                c.beginPath();
                c.arc(0, 0, r - 4, 0, Math.PI * 2); 
                c.clip();

                const code = country.code;
                switch(code) {
                    case 'FR':
                        c.fillStyle = '#00209F'; c.fillRect(-r, -r, r * (2/3), r * 2);
                        c.fillStyle = '#FFFFFF'; c.fillRect(-r * (1/3), -r, r * (2/3), r * 2);
                        c.fillStyle = '#F81A2D'; c.fillRect(r * (1/3), -r, r * (2/3), r * 2);
                        break;
                    case 'DE':
                        c.fillStyle = '#000000'; c.fillRect(-r, -r, r * 2, r * (2/3));
                        c.fillStyle = '#FF0000'; c.fillRect(-r, -r * (1/3), r * 2, r * (2/3));
                        c.fillStyle = '#FFCC00'; c.fillRect(-r, r * (1/3), r * 2, r * (2/3));
                        break;
                    case 'IN':
                        c.fillStyle = '#FF9933'; c.fillRect(-r, -r, r * 2, r * (2/3));
                        c.fillStyle = '#FFFFFF'; c.fillRect(-r, -r * (1/3), r * 2, r * (2/3));
                        c.fillStyle = '#138808'; c.fillRect(-r, r * (1/3), r * 2, r * (2/3));
                        c.beginPath(); c.arc(0, 0, r * 0.2, 0, Math.PI * 2); c.strokeStyle = '#000080'; c.lineWidth = r * 0.05; c.stroke();
                        break;
                    case 'JP':
                        c.fillStyle = '#FFFFFF'; c.fillRect(-r, -r, r * 2, r * 2);
                        c.beginPath(); c.arc(0, 0, r * 0.5, 0, Math.PI * 2); c.fillStyle = '#BC002D'; c.fill();
                        break;
                    case 'US':
                        c.fillStyle = '#FFFFFF'; c.fillRect(-r, -r, r * 2, r * 2);
                        c.fillStyle = '#B22234';
                        for(let i = 0; i < 7; i++) {
                            c.fillRect(-r, -r + (i * r * 2 / 7), r * 2, r / 7);
                        }
                        c.fillStyle = '#3C3B6E';
                        c.fillRect(-r, -r, r, r);
                        break;
                    case 'BR':
                        c.fillStyle = '#009739'; c.fillRect(-r, -r, r * 2, r * 2);
                        c.fillStyle = '#FEDF00';
                        c.beginPath();
                        c.moveTo(0, -r * 0.7); c.lineTo(r * 0.7, 0); c.lineTo(0, r * 0.7); c.lineTo(-r * 0.7, 0);
                        c.closePath(); c.fill();
                        c.fillStyle = '#002776';
                        c.beginPath(); c.arc(0, 0, r * 0.35, 0, Math.PI * 2); c.fill();
                        break;
                    default:
                        c.fillStyle = country.colors[0];
                        c.fillRect(-r, -r, r * 2, r * (2/3));
                        c.fillStyle = country.colors[1];
                        c.fillRect(-r, -r * (1/3), r * 2, r * (2/3));
                        c.fillStyle = country.colors[2] || country.colors[0];
                        c.fillRect(-r, r * (1/3), r * 2, r * (2/3));
                        break;
                }
                c.restore();

                // Standard white stroke border around the circle
                c.beginPath();
                c.arc(r, r, r - 5, 0, Math.PI * 2);
                c.strokeStyle = '#ffffff';
                c.lineWidth = 10;
                c.stroke();

                // Country text label overlay (Legible stroke format)
                c.fillStyle = '#ffffff';
                c.strokeStyle = '#000000';
                c.lineWidth = 14;
                c.font = `950 85px Roboto, sans-serif`;
                c.textAlign = 'center';
                c.textBaseline = 'middle';
                c.strokeText(code, r, r);
                c.fillText(code, r, r);

                flagCache[code] = canvas;
            });

        function toggleBGM() {
            const player = document.getElementById('bgm-player');
            const btn = document.getElementById('bgm-btn');
            
            if (player.paused) {
                player.play().then(() => {
                    btn.innerHTML = `<i class="fa-solid fa-pause"></i> Pause Music`;
                    btn.className = "px-2.5 py-0.5 bg-rose-600 hover:bg-rose-500 text-white rounded text-[10px] font-bold transition flex items-center gap-1";
                }).catch(err => {
                    console.warn("Autoplay blocked:", err);
                });
            } else {
                player.pause();
                btn.innerHTML = `<i class="fa-solid fa-play"></i> Play Music`;
                btn.className = "px-2.5 py-0.5 bg-blue-600 hover:bg-blue-500 text-white rounded text-[10px] font-bold transition flex items-center gap-1";
            }
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioDestination = audioCtx.createMediaStreamDestination();

                // Route BGM Player to both output speakers and recording destination
                const player = document.getElementById('bgm-player');
                try {
                    bgmSource = audioCtx.createMediaElementSource(player);
                    bgmSource.connect(audioCtx.destination);
                    bgmSource.connect(audioDestination);
                } catch(e) {
                    console.warn("AudioContext local CORS restriction. Playing normally but BGM will skip in WebM track.", e);
                }
            }
        }

        function playSound(type) {
            if (!soundEnabled || isHeadlessMode) return; // Bypass audio play overhead in headless automated script
            initAudio();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                
                // Route Synthesizer sounds to headphones/speakers AND the screen recorder!
                gain.connect(audioCtx.destination);
                if (audioDestination) {
                    gain.connect(audioDestination);
                }

                if (type === 'kick') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(45, audioCtx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
                } else if (type === 'bounce') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(320, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(140, audioCtx.currentTime + 0.06);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.06);
                } else if (type === 'goal') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, audioCtx.currentTime); 
                    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1); 
                    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2); 
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + 0.35);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.35);
                } else if (type === 'fail') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.22);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.22);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.22);
                }
            } catch (e) {}
        }

        function addLiveLog(message, type = 'info') {
            let color = '#cbd5e1'; // slate-300
            let prefix = '⚡';
            
            if (type === 'goal') { color = '#34d399'; prefix = '⚽'; } // emerald-400
            else if (type === 'announcement') { color = '#fbbf24'; prefix = '📢'; } // amber-400
            else {
                return;
            }

            liveLogs.push({ text: `${prefix} ${message}`, color: color });
            if (liveLogs.length > 25) liveLogs.shift();
        }

        window.onload = function() {
            mainCanvas = document.getElementById('physics-canvas');
            ctx = mainCanvas.getContext('2d');
            
            // Generate clean graphics cache exactly once
            preRenderFlags();
            
            buildSimulationReplica();
            resetGame();

            // Headless mode check: real-time automated browser-side recording active
            if (isHeadlessMode) {
                console.log("Real-time Headless Recording Pipeline Active!");
                // Native 4K capture scale active
                window.setRenderScale(1.0);
                
                // Audio initialization safety bypass trigger
                soundEnabled = true;
                
                // Delay buffer for launch stabilization
                setTimeout(() => {
                    toggleRecording(); 
                }, 1500);
            }
        };

        function setSimSpeed(speed) {
            simSpeed = speed;
            const speeds = [1, 10, 20, 30, 40, 50, 100];
            speeds.forEach(s => {
                const btn = document.getElementById(`speed-${s}x`);
                if (btn) {
                    btn.className = s === speed ? 
                        'px-2 py-0.5 rounded text-xs font-bold bg-blue-600 text-white transition' : 
                        'px-2 py-0.5 rounded text-xs font-bold bg-slate-700 text-slate-300 hover:bg-slate-600 transition';
                }
            });
        }

        function startGameManual() {
            if (gameStarted) return;
            gameStarted = true;
            isSimPaused = false;
            
            // Disable manual start button once match is successfully running
            const startBtn = document.getElementById('start-btn');
            if (startBtn) {
                startBtn.disabled = true;
                startBtn.className = "px-3.5 py-1.5 bg-slate-800 text-slate-500 rounded-lg text-xs font-bold cursor-not-allowed flex items-center gap-1.5 shadow-none";
                document.getElementById('start-text').textContent = "Match Running";
            }
            resetGame(); // Ensure countries and rounds are freshly reset on manual start!
            startRound(1);
        }

        function buildSimulationReplica() {

            engine = Engine.create({ gravity: { y: 1.65, scale: 0.001 } });
            world = engine.world;

            // Outside Boundaries (Mapping on a 3840 x 2160 container coordinates)

            const playAreaLeftWall = Bodies.rectangle(535, 1080, 20, 2160, { isStatic: true, label: 'wall' });

            // Top Sloped platform slanted DOWN to the left (Shifted left by 175px)
            const topSlope = Bodies.rectangle(1937, 130, 1996, 30, {

            });
            
            const topBoundaryWall = Bodies.rectangle(1937, 40, 1996, 15, { isStatic: true, label: 'wall' });
            World.add(world, [topSlope, topBoundaryWall]);

            // Chute Divider separating vertical Plinko chute from active field turf (Shifted left by 175px)
            const chuteWall = Bodies.rectangle(940, 1250, 25, 1750, { isStatic: true, label: 'wall' });
            World.add(world, chuteWall);

            // Left Plinko Chute static pegs scaled appropriately (Shifted left by 175px)
            const pegs = [
                Bodies.circle(687, 512, 50, { isStatic: true, label: 'peg' }),
                Bodies.circle(782, 725, 50, { isStatic: true, label: 'peg' }),
                Bodies.circle(687, 938, 50, { isStatic: true, label: 'peg' }),
                Bodies.circle(782, 1151, 50, { isStatic: true, label: 'peg' }),
                Bodies.circle(687, 1364, 50, { isStatic: true, label: 'peg' }),
                Bodies.circle(782, 1577, 50, { isStatic: true, label: 'peg' })
            ];
            World.add(world, pegs);

            // Spinner center (Shifted left by 175px to x = 728, y = 1995)
            bootSpinner = Bodies.rectangle(728, 1995, 230, 20, {

            });
            World.add(world, bootSpinner);

            // Left & Right Rounded Corners under the rotating spinner (Radius = 50px matching request)
            const R = 50;

                const rcx = 940 - R + R * Math.cos(alpha);
                const rcy = 2095 - R + R * Math.sin(alpha);
                rightCornerBodies.push(Bodies.circle(rcx, rcy, 12, { isStatic: true, label: 'wall' }));
            }
            World.add(world, [...leftCornerBodies, ...rightCornerBodies]);

            // Rebuilt dynamically inside startRound to avoid scaling leaks
            // Keepers remain at their natural visual sizes! No shrinking needed anymore.
            defenderSweeper = Bodies.rectangle(1365, 1810, 55, 180, { isStatic: true, label: 'defender' }); 
            defenderJumper = Bodies.rectangle(1825, 1230, 90, 240, { isStatic: true, label: 'defender' });  
            defenderGoalie = Bodies.rectangle(2503, 1740, 65, 180, { isStatic: true, label: 'defender' });  
            World.add(world, [defenderSweeper, defenderJumper, defenderGoalie]);

            // Ground supports around the pit gap (Shifted left by 175px)
            const groundLeft = Bodies.rectangle(1378, 2095, 894, 64, { isStatic: true, label: 'wall' });
            const groundRight = Bodies.rectangle(2790, 2095, 330, 64, { isStatic: true, label: 'wall' });
            World.add(world, [groundLeft, groundRight]);

            // Deep pit gap sensor to detect blocked balls (Shifted left by 175px)
            sensors.pitGap = Bodies.rectangle(2075, 2160, 500, 250, {
                isStatic: true,
                isSensor: true,
                label: 'pit'
            });
            World.add(world, sensors.pitGap);

            // White Goalpost net height significantly increased (from 1640 top to 1100 top, height 965px!)
            // Stilted at angle to slide balls down top smoothly
            const goalTop = Bodies.rectangle(2790, 1100, 330, 34, { isStatic: true, angle: -0.22, label: 'wall' });
            const goalLeftWall = Bodies.rectangle(2625, 1583, 34, 965, { isStatic: true, label: 'wall' });
            World.add(world, [goalTop, goalLeftWall]);

            // Goal scoring sensor zone significantly stretched to match the new tall goal structure
            sensors.goalTrigger = Bodies.rectangle(2790, 1583, 290, 940, {

        function resetGame() {
            countries = countriesData.map(c => ({
                ...c,
                status: 'racing',
                rank: 0,
                eliminatedRound: 0,
                trail: []
            }));

            currentRound = 1;
            currentSurvivors = [];
            currentEliminated = [];
            matchDuration = 0; // Reset clock
        }

        function startRound(roundNum) {
            currentRound = roundNum;
            const config = roundConfigs[currentRound - 1];
            currentSurvivors = [];
            
            // Re-instantiate goalkeeper sizes
            World.remove(world, [defenderSweeper, defenderJumper, defenderGoalie]);
            defenderSweeper = Bodies.rectangle(1365, 1810, 55, 180, { isStatic: true, label: 'defender' }); 
            defenderJumper = Bodies.rectangle(1825, 1230, 90, 240, { isStatic: true, label: 'defender' });  
            defenderGoalie = Bodies.rectangle(2503, 1740, 65, 180, { isStatic: true, label: 'defender' });
            World.add(world, [defenderSweeper, defenderJumper, defenderGoalie]);
            
            roundTimer = 0;
            isDefendersWindowOpen = false;

            // Wipe active spheres
            marbles.forEach(m => World.remove(world, m.body));
            marbles = [];

            const activeConts = countries.filter(c => c.status === 'racing');

            // Queue up spawning
            if (currentRound <= 4) {
                // Ensure protected countries spawn first to avoid deadlocks
                spawnQueue = activeConts.sort((a, b) => {
                    const aProt = protectedCountries.includes(a.code) ? 1 : 0;
                    const bProt = protectedCountries.includes(b.code) ? 1 : 0;
                    return bProt - aProt;
                });
            } else {
                spawnQueue = [...activeConts].sort(() => Math.random() - 0.5);
            }

            lastSpawnTime = 0;

            if (isHeadlessMode) {
                // Instantly start in headless scenario without 3s buffer delay
                overlayTimerActive = false;
                overlayMode = '';
                addLiveLog(`Round ${currentRound} started`, 'announcement');
            } else {
                // Start automated canvas countdown
                triggerCanvasOverlay('countdown', 3, () => {
                    addLiveLog(`Round ${currentRound} started`, 'announcement');
                });
            }
        }

        function triggerCanvasOverlay(mode, sec, callback) {
            overlayMode = mode;
            overlayTimeLeft = sec;
            overlayMode === 'countdown' ? (overlayTimerActive = true) : (overlayTimerActive = true);

            function tick() {
                if (!overlayTimerActive) return;
                if (overlayTimeLeft > 0) {
                    if (overlayMode === 'countdown') playSound('bounce');
                    setTimeout(() => {
                        overlayTimeLeft--;
                        tick();
                    }, 1000);
                } else {
                    overlayTimerActive = false;
                    if (overlayMode === 'countdown') playSound('goal');
                    overlayMode = ''; // Crucial reset so active match telemetry is allowed to render!
                    callback();
                }
            }
            tick();
        }

        function spawnNextMarble() {
            if (spawnQueue.length === 0) return;

            const country = spawnQueue.shift();
            const radius = 45; // Scaled 4K sphere radius
            
            // Drop on the top slope (Shifted left by 175px)
            const posX = 2905;
            const posY = 60;

            const ball = Bodies.circle(posX, posY, radius, {
                restitution: 0.96,
                friction: 0.0,
                frictionAir: 0.0,
                density: 0.002,
                label: 'marble'
            });

            ball.country = country;
            country.trail = []; 

            World.add(world, ball);
            marbles.push({
                body: ball,
                country: country
            });
        }

        function handleCollisions(event) {
            const pairs = event.pairs;
            pairs.forEach(pair => {
                const labelA = pair.bodyA.label;
                const labelB = pair.bodyB.label;

                // Boot kicks
                if ((labelA === 'marble' && labelB === 'boot_spinner') || (labelA === 'boot_spinner' && labelB === 'marble')) {
                    const marbleBody = labelA === 'marble' ? pair.bodyA : pair.bodyB;
                    playSound('kick');
                    // Propel ball dynamically to the right with faster velocities
                    Body.setVelocity(marbleBody, {
                        x: 58 + Math.random() * 20,
                        y: -24 - Math.random() * 14
                    });
                }

                // Bounce effects
                if ((labelA === 'marble' && labelB === 'peg') || (labelA === 'peg' && labelB === 'marble')) {
                    const marbleBody = labelA === 'marble' ? pair.bodyA : pair.bodyB;
                    playSound('bounce');
                }

                // Goalkeeper blocks
                if ((labelA === 'marble' && labelB === 'defender') || (labelA === 'defender' && labelB === 'marble')) {
                    playSound('fail');
                }

                // Teleport on hitting pit gap
                if (labelA === 'pit' && labelB === 'marble') respawnToTopQueue(pair.bodyB);
                if (labelB === 'pit' && labelA === 'marble') respawnToTopQueue(pair.bodyA);

                // Goal score
                if (labelA === 'goal' && labelB === 'marble') handleScore(pair.bodyB);
                if (labelB === 'goal' && labelA === 'marble') handleScore(pair.bodyA);
            });
        }

        function respawnToTopQueue(body) {
            if (!body || !body.country) return;
            Body.setPosition(body, {
                x: 2725 + Math.random() * 200,
                y: 60
            });
            Body.setVelocity(body, { x: -8, y: 4 });
            Body.setAngularVelocity(body, 0);
        }

        function handleScore(body) {
            if (!body || !body.country) return;
            const country = body.country;

            if (currentSurvivors.some(s => s.code === country.code)) return;

            const config = roundConfigs[currentRound - 1];
            if (currentSurvivors.length >= config.targetSurvivors) {
                respawnToTopQueue(body);
                return;
            }

            // Scripted top-10 finalists rule
            if (currentRound <= 4) {
                const openSlots = config.targetSurvivors - currentSurvivors.length;
                const remainingProtected = countries.filter(c => c.status === 'racing' && protectedCountries.includes(c.code) && !currentSurvivors.some(s => s.code === c.code));
                
                if (!protectedCountries.includes(country.code) && openSlots <= remainingProtected.length) {
                    respawnToTopQueue(body);
                    return;
                }
            }

            // Register survivor
            currentSurvivors.push(country);
            country.status = 'survived';
            playSound('goal');
            
            if (overlayMode === '') {
                addLiveLog(`${country.name} survived`, 'goal');
            }

            World.remove(world, body);
            marbles = marbles.filter(m => m.body !== body);

            if (currentSurvivors.length === config.targetSurvivors) {
                triggerRoundWrap();
            }
        }

        function triggerRoundWrap() {
            const config = roundConfigs[currentRound - 1];
            
            // Eliminate remainder
            const failedList = countries.filter(c => c.status === 'racing' && !currentSurvivors.some(s => s.code === c.code));

            failedList.forEach(c => {
                c.status = 'eliminated';
                c.eliminatedRound = currentRound;
            });
            
            currentSurvivors.forEach(c => {
                c.status = 'racing';
            });

            currentEliminated = failedList;

            playSound('fail');

            if (currentRound === 9) {
                // Stop the simulation loop and recording immediately
                gameStarted = false;
                isSimPaused = true;
                
                if (isRecording) {
                    toggleRecording(); // Stop and automatically trigger download/bridge stream on champion reveal!
                }

                // Show champion screen indefinitely (or very long 99999s) and enable manual restart
                triggerCanvasOverlay('champion', 99999, () => {
                    // Do nothing on timeout
                });

                // Re-enable Start button as "Restart Match"
                const startBtn = document.getElementById('start-btn');
                if (startBtn) {
                    startBtn.disabled = false;
                    startBtn.className = "px-3.5 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-xs font-bold transition flex items-center gap-1.5 shadow-lg";
                    document.getElementById('start-text').textContent = "Restart Match";
                }
            } else {
                if (isHeadlessMode) {
                    // Automate immediate round switching for real-time headless recording speedups
                    startRound(currentRound + 1);
                } else {
                    // Show round results for 5 seconds, then advance automatically
                    triggerCanvasOverlay('round_summary', 5, () => {
                        startRound(currentRound + 1);
                    });
                }
            }
        }

        // Standard 30 FPS Render loop with real-time frame progression
        function renderLoop(timestamp) {
            requestAnimationFrame(renderLoop);

            if (!timestamp) timestamp = performance.now();
            if (!lastRenderTime) lastRenderTime = timestamp;
            const elapsed = timestamp - lastRenderTime;

            // Lock rendering exactly to 30 FPS to reduce CPU overhead
            if (elapsed >= fpsInterval) {
                lastRenderTime = timestamp - (elapsed % fpsInterval);

                // Run physics steps only if match has been started by user
                if (!isSimPaused && gameStarted) {
                    // Headless automation speeds physics loop to complete game rapidly!
                    let steps = 1;
                    let dt = 0.0166;
                    
                    if (isHeadlessMode) {
                        // Accelerate timeline steps slightly to save Actions execution minutes
                        steps = 5; 
                        dt = 0.0166;
                    } else {
                        if (simSpeed === 1) { steps = 2; dt = 0.0166; }
                        else if (simSpeed === 10) { steps = 10; dt = 0.0166; }
                        else if (simSpeed === 20) { steps = 10; dt = 0.0166 * 2; }
                        else if (simSpeed === 30) { steps = 10; dt = 0.0166 * 3; }
                        else if (simSpeed === 40) { steps = 10; dt = 0.0166 * 4; }
                        else if (simSpeed === 50) { steps = 10; dt = 0.0166 * 5; }
                        else if (simSpeed === 100) { steps = 10; dt = 0.0166 * 10; }
                    }

                    const speedStep = dt * 1000;

                    for (let step = 0; step < steps; step++) {
                        simTime += dt;
                        matchDuration += dt; 
                        roundTimer += dt; 

                        if (spawnQueue.length > 0) {
                            lastSpawnTime += dt;
                            if (lastSpawnTime >= 0.35) {
                                spawnNextMarble();
                                lastSpawnTime = 0;
                            }
                        }

                        // Spin boot arms
                        bootAngle += 0.055;
                        Body.setAngle(bootSpinner, bootAngle);

                        // 12-Second Defensive cycle loops indefinitely
                        const cycleTime = simTime % 12;
                        let sweeperY, jumperY, goalieY;

                        if (cycleTime > 8) {
                            isDefendersWindowOpen = true;
                            sweeperY = 1950;
                            jumperY = 1350;
                            goalieY = 1920;
                        } else {
                            isDefendersWindowOpen = false;
                            sweeperY = 1750 + Math.sin(simTime * 1.5) * 150;
                            jumperY = 1680 + Math.sin(simTime * 1.5 - 1.2) * 255;
                            goalieY = 1720 + Math.sin(simTime * 1.5 - 2.4) * 200;
                        }

                        Body.setPosition(defenderSweeper, { x: defenderSweeper.position.x, y: sweeperY });
                        Body.setPosition(defenderJumper, { x: defenderJumper.position.x, y: jumperY });
                        Body.setPosition(defenderGoalie, { x: defenderGoalie.position.x, y: goalieY });

                        Engine.update(engine, speedStep);

                        marbles.forEach(m => {
                            m.country.trail.push({ x: m.body.position.x, y: m.body.position.y });
                            if (m.country.trail.length > 8) m.country.trail.shift();

                            const pos = m.body.position;

                            if (pos.y > 2220 || pos.x < 535 || pos.x > 2955) {
                                respawnToTopQueue(m.body);
                            }

                            if (pos.x < 940 && pos.y > 1650 && Math.abs(m.body.velocity.x) < 0.05 && Math.abs(m.body.velocity.y) < 0.05) {
                                Body.applyForce(m.body, pos, { x: 0.22, y: -0.22 });
                            }
                        });
                    }
                }

                updateControlTimerWidget();
                drawFrame();
            }
        }

        function updateControlTimerWidget() {
            const timerEl = document.getElementById('session-timer');
            if (!timerEl) return;
            
            const totalMs = Math.floor(matchDuration * 1000);
            const hrs = Math.floor(totalMs / 3600000).toString().padStart(2, '0');
            const mins = Math.floor((totalMs % 3600000) / 60000).toString().padStart(2, '0');
            const secs = Math.floor((totalMs % 60000) / 1000).toString().padStart(2, '0');
            
            timerEl.textContent = `${hrs}:${mins}:${secs}`;
        }

        function drawFrame() {
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

            // Matrix scale transformation context wrapper
            ctx.save();
            ctx.scale(renderScale, renderScale);

            // Arena base fill
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 3840, 2160);

            // Left Sidebar background (Live Commentary HUD)
            ctx.fillStyle = 'rgba(15, 23, 42, 0.90)';
            ctx.fillRect(0, 0, 525, 2160);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 10;
            ctx.strokeRect(0, 0, 525, 2160);

            // Right Sidebar background (Leaderboard Standings HUD)
            ctx.fillStyle = 'rgba(15, 23, 42, 0.90)';
            ctx.fillRect(2965, 0, 875, 2160);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 10;
            ctx.strokeRect(2965, 0, 875, 2160);

            // 1. Draw static boundaries & plinko circle nodes inside shifted game bounds (x: 535 to 2955)
            const bodies = Composite.allBodies(world);
            bodies.forEach(b => {
                if (b.isSensor) return;

                ctx.save();
                if (b.label === 'wall') {
                    ctx.fillStyle = '#1e293b';
                    ctx.beginPath();
                    b.vertices.forEach((v, idx) => {
                        if (idx === 0) ctx.moveTo(v.x, v.y);
                        else ctx.lineTo(v.x, v.y);
                    });
                    ctx.closePath();
                    ctx.fill();
                } else if (b.label === 'peg') {
                    ctx.fillStyle = '#555555';
                    ctx.strokeStyle = '#333333';
                    ctx.lineWidth = 12;
                    ctx.beginPath();
                    ctx.arc(b.position.x, b.position.y, b.circleRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();
            });

            // 2. Draw Boot Spinner kicker
            ctx.save();
            ctx.translate(bootSpinner.position.x, bootSpinner.position.y);
            ctx.rotate(bootSpinner.angle);
            
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 36;
            ctx.beginPath();
            ctx.moveTo(-115, 0); ctx.lineTo(115, 0);
            ctx.moveTo(0, -115); ctx.lineTo(0, 115);
            ctx.stroke();

            const spokeSize = 115;
            drawBlueBoot(ctx, spokeSize, 0, 0); 
            drawBlueBoot(ctx, -spokeSize, 0, Math.PI); 
            drawBlueBoot(ctx, 0, spokeSize, Math.PI / 2); 
            drawBlueBoot(ctx, 0, -spokeSize, -Math.PI / 2); 
            ctx.restore();

            // Draw Left and Right Rounded Arc Fillets in the spinner chamber (Radius matching R = 50)
            ctx.save();
            ctx.fillStyle = '#1e293b';
            // Left Rounded Corner Fillet
            ctx.beginPath();
            ctx.moveTo(535, 2095);
            ctx.lineTo(535, 2045);
            ctx.quadraticCurveTo(535, 2095, 585, 2095);
            ctx.closePath();
            ctx.fill();

            // Right Rounded Corner Fillet
            ctx.beginPath();
            ctx.moveTo(940, 2095);
            ctx.lineTo(940, 2045);
            ctx.quadraticCurveTo(940, 2095, 890, 2095);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // 3. Draw Goalkeepers
            drawFootballerCharacter(ctx, defenderSweeper, '#10b981', '#047857'); // Sweeper - Green
            drawFootballerCharacter(ctx, defenderJumper, '#2563eb', '#1e40af');  // Jumper - Blue
            drawFootballerCharacter(ctx, defenderGoalie, '#a855f7', '#7e22ce');  // Goalie - Purple

            // 4. Tall Goalpost structures shifted inside play zone
            ctx.save();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 12;
            ctx.strokeRect(2625, 1100, 330, 965);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 4;
            for (let gx = 2625; gx <= 2955; gx += 48) {
                ctx.beginPath(); ctx.moveTo(gx, 1100); ctx.lineTo(gx, 2065); ctx.stroke();
            }
            for (let gy = 1100; gy <= 2065; gy += 40) {
                ctx.beginPath(); ctx.moveTo(2625, gy); ctx.lineTo(2955, gy); ctx.stroke();
            }
            ctx.restore();

            // 5. Grass floors
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(940, 2095, 894, 65); 
            ctx.fillRect(2325, 2095, 630, 65); 

            // 6. Draw active trails
            ctx.save();
            marbles.forEach(m => {
                m.country.trail.forEach((pos, idx) => {
                    const alpha = (idx + 1) / m.country.trail.length * 0.25;
                    ctx.fillStyle = m.country.colors[0];
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 45 - (8 - idx) * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                });
            });
            ctx.restore();

            // 7. Active country spheres using GPU-optimized caching system
            marbles.forEach(m => {
                const pos = m.body.position;
                drawCountryFlag(ctx, pos.x, pos.y, m.body.circleRadius, m.country);
            });

            // 8. Widescreen survivors container HUD
            ctx.save();
            ctx.fillStyle = '#000000';
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 10;
            ctx.fillRect(1145, 140, 1200, 200);
            ctx.strokeRect(1145, 140, 1200, 200);

            ctx.fillStyle = '#22c55e';
            ctx.font = '900 48px Roboto, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Survivors', 1745, 95);

            currentSurvivors.forEach((c, idx) => {
                const col = idx % 20; 
                const row = Math.floor(idx / 20); 
                const sx = 1190 + (col * 58); 
                const sy = 195 + (row * 60);  
                drawCountryFlag(ctx, sx, sy, 25, c); 
            });

            const config = roundConfigs[currentRound - 1];
            const leftSpots = config.targetSurvivors - currentSurvivors.length;
            ctx.fillStyle = '#ffffff';
            ctx.font = '900 52px Roboto, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`Spots left: ${leftSpots}`, 1745, 410);

            if (isDefendersWindowOpen) {
                let blinkAlpha = 0.5 + Math.sin(Date.now() * 0.015) * 0.45;
                ctx.fillStyle = `rgba(239, 68, 68, ${blinkAlpha})`; // Blinking Red
                ctx.font = '900 40px Share Tech Mono, monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`⚡ DEFENSE BREAKDOWN: GOAL WINDOW OPEN ⚡`, 1745, 480);
            }
            ctx.restore();

            // 9. Draw Left Commentary Live Logs directly on canvas
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.font = '900 42px Roboto, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('MATCH TELEMETRY', 262, 95);
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(50, 130); ctx.lineTo(475, 130); ctx.stroke();

            // Dynamic Target HUD Block inside the Commentary panel
            const currentConfig = roundConfigs[currentRound - 1];
            const startC = currentConfig.startCount;
            const targetC = currentConfig.targetSurvivors;
            const elimC = startC - targetC;
            ctx.fillStyle = '#fbbf24'; // amber-400
            ctx.font = '900 40px Share Tech Mono, monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`TARGET: ${startC} ➔ ${targetC} SAFE`, 262, 185);
            ctx.font = '700 32px Share Tech Mono, monospace';
            ctx.fillText(`(ELIMINATING ${elimC} COUNTRIES)`, 262, 230);

            ctx.font = '600 30px Share Tech Mono, monospace';
            ctx.textAlign = 'left';
            liveLogs.forEach((log, idx) => {
                ctx.fillStyle = log.color;
                ctx.fillText(log.text, 50, 305 + (idx * 75), 425);
            });
            ctx.restore();

            // 10. Draw standings on Right Sidebar
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.font = '900 42px Roboto, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('STANDINGS', 3402, 95);
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(3015, 130); ctx.lineTo(3790, 130); ctx.stroke();

            ctx.textBaseline = 'middle';
            countries.forEach((c, idx) => {
                const col = Math.floor(idx / 25);
                const row = idx % 25;
                const ly = 210 + (row * 76);

                let badgeColor = '#94a3b8'; // slate-400
                let statusLabel = 'RACING';
                if (c.status === 'eliminated') {
                    badgeColor = '#f87171'; // rose-400
                    statusLabel = `OUT R${c.eliminatedRound}`;
                } else if (currentSurvivors.some(s => s.code === c.code)) {
                    badgeColor = '#34d399'; // emerald-400
                    statusLabel = 'SAFE';
                }

                let fx, nx, sx; 
                if (col === 0) {
                    fx = 3003; 
                    nx = 3040; 
                    sx = 3384; 
                } else {
                    fx = 3428; 
                    nx = 3467; 
                    sx = 3828; 
                }

                drawCountryFlag(ctx, fx, ly, 24, c);
                
                ctx.fillStyle = '#f1f5f9';
                ctx.font = '800 36px Roboto, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(c.name.substring(0, 11), nx, ly);

                ctx.fillStyle = badgeColor;
                ctx.font = '900 26px Share Tech Mono, monospace'; 
                ctx.textAlign = 'right';
                ctx.fillText(statusLabel, sx, ly);
            });
            ctx.restore();

            // 11. Render automated canvas transitions
            if (overlayTimerActive) {
                renderOverlayScreen();
            }

            ctx.restore();
        }

        function renderOverlayScreen() {
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.94)';
            ctx.fillRect(535, 0, 2420, 2160);

            if (overlayMode === 'countdown') {
                ctx.fillStyle = '#60a5fa';
                ctx.font = '900 180px Roboto, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(overlayTimeLeft, 1745, 1000);

                ctx.fillStyle = '#94a3b8';
                ctx.font = '700 48px Roboto, sans-serif';
                ctx.fillText(`ROUND ${currentRound} STARTING SOON`, 1745, 1150);
            } else if (overlayMode === 'round_summary') {
                ctx.fillStyle = '#ffffff';
                ctx.font = '900 85px Roboto, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`ROUND ${currentRound} COMPLETE!`, 1745, 230); 

                ctx.fillStyle = '#34d399';
                ctx.font = '900 48px Roboto, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`SAFE (${currentSurvivors.length})`, 675, 385);

                currentSurvivors.forEach((c, idx) => {
                    const col = idx % 10;
                    const row = Math.floor(idx / 10);
                    const rx = 675 + (col * 110);
                    const ry = 465 + (row * 110); 
                    drawCountryFlag(ctx, rx, ry, 45, c);
                });

                ctx.fillStyle = '#f87171';
                ctx.font = '900 48px Roboto, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`OUT (${currentEliminated.length})`, 675, 1065);

                currentEliminated.forEach((c, idx) => {
                    const col = idx % 10;
                    const row = Math.floor(idx / 10);
                    const rx = 675 + (col * 110);
                    const ry = 1145 + (row * 110); 
                    drawCountryFlag(ctx, rx, ry, 45, c);
                });

                ctx.fillStyle = '#fbbf24';
                ctx.font = '700 48px Share Tech Mono, monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`Next round begins in ${overlayTimeLeft}s...`, 1745, 1950);
            } else if (overlayMode === 'champion') {
                ctx.fillStyle = '#fbbf24';
                ctx.font = '900 120px Roboto, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('👑 CHAMPION 👑', 1745, 450);

                const winner = currentSurvivors[0];
                drawCountryFlag(ctx, 1745, 900, 250, winner);

                ctx.fillStyle = '#ffffff';
                ctx.font = '900 110px Roboto, sans-serif';
                ctx.fillText(winner.name.toUpperCase(), 1745, 1350);

                ctx.fillStyle = '#94a3b8';
                ctx.font = '700 48px Share Tech Mono, monospace';
                ctx.fillText(`Tournament Finished! Click 'Restart Match' above to play again.`, 1745, 1650);
            }

            ctx.restore();
        }

        // Draw boot spinner with smaller blade diameter (115px)
        function drawBlueBoot(c, x, y, angle) {
            c.save();
            c.translate(x, y);
            c.rotate(angle);
            
            c.fillStyle = '#2563eb';
            c.strokeStyle = '#ffffff';
            c.lineWidth = 4;
            c.beginPath();
            c.ellipse(18, 0, 32, 16, 0, 0, Math.PI * 2);
            c.fill(); c.stroke();
            
            c.fillStyle = '#ffffff';
            c.fillRect(5, 9, 24, 6);
            c.restore();
        }

        // Complete proportional drawing engine - legs/feet never clip below bounding box!
        function drawFootballerCharacter(ctx, body, shirtCol, pantsCol) {
            const pos = body.position;
            const w = body.bounds.max.x - body.bounds.min.x;
            const h = body.bounds.max.y - body.bounds.min.y;

            ctx.save();
            ctx.translate(pos.x, pos.y);

            // Head: top 20% of height
            const headRadius = h * 0.10;
            const headY = -h/2 + headRadius;
            ctx.fillStyle = '#d1a080'; 
            ctx.beginPath();
            ctx.arc(0, headY, headRadius, 0, Math.PI * 2);
            ctx.fill();

            // Hair: top 12%
            ctx.fillStyle = '#2d1a0a';
            ctx.beginPath();
            ctx.arc(0, headY - h*0.03, headRadius * 1.1, Math.PI, 0);
            ctx.fill();

            // Arms: relative to jersey torso
            ctx.strokeStyle = '#d1a080';
            ctx.lineWidth = w * 0.18;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-w/2, -h/2 + h*0.35);
            ctx.lineTo(-w/2 - w*0.2, -h/2 + h*0.1);
            ctx.moveTo(w/2, -h/2 + h*0.35);
            ctx.lineTo(w/2 + w*0.2, -h/2 + h*0.1);
            ctx.stroke();

            // Jersey (Shirt): 20% to 56% of height (height: 36%)
            ctx.fillStyle = shirtCol;
            ctx.fillRect(-w/2, -h/2 + h*0.20, w, h*0.36);

            // Shorts (Pants): 56% to 71% of height (height: 15%)
            ctx.fillStyle = pantsCol;
            ctx.fillRect(-w/2, -h/2 + h*0.56, w, h*0.15);

            // Legs: 71% to 88% of height (height: 17%)
            ctx.fillStyle = '#d1a080';
            const legWidth = w * 0.28;
            ctx.fillRect(-w * 0.35, -h/2 + h*0.71, legWidth, h*0.17);
            ctx.fillRect(w * 0.35 - legWidth, -h/2 + h*0.71, legWidth, h*0.17);

            // Cleats (Shoes): 88% to 100% of height (height: 12%). Ends exactly at h/2.
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(-w * 0.42, -h/2 + h*0.88, w * 0.36, h*0.12);
            ctx.fillRect(w * 0.42 - w * 0.36, -h/2 + h*0.88, w * 0.36, h*0.12);

            ctx.restore();
        }

        // GPU-Accelerated Pre-Rendered Flag Draw Function
        function drawCountryFlag(ctxCanvas, x, y, r, country) {
            const cachedFlag = flagCache[country.code];
            if (cachedFlag) {
                // High-performance hardware accelerated blit operation
                ctxCanvas.drawImage(cachedFlag, x - r, y - r, r * 2, r * 2);
            } else {
                // Secure fallback
                ctxCanvas.fillStyle = country.colors[0];
                ctxCanvas.beginPath(); ctxCanvas.arc(x, y, r, 0, Math.PI * 2); ctxCanvas.fill();
            }
        }

        // SUPREME BROWSER RECORDING ENGINE: Records Both HD 4K Video + High-quality Audio
        function toggleRecording() {
            const btn = document.getElementById('record-btn');
            const txt = document.getElementById('record-text');

            if (!isRecording) {
                // Automatically start match simulation upon record trigger if not already active
                if (!gameStarted) {
                    startGameManual();
                }

                // Ensure audio routing is safely initialized
                initAudio();
                recordedChunks = [];
                
                // 1. Capture pristine 4K 30fps Video Track directly from canvas
                const canvasStream = mainCanvas.captureStream(30); 
                const videoTrack = canvasStream.getVideoTracks()[0];
                
                // 2. Mix with Synthesized Audio Track
                let combinedStream;
                if (audioDestination && audioDestination.stream.getAudioTracks().length > 0) {
                    const audioTrack = audioDestination.stream.getAudioTracks()[0];
                    combinedStream = new MediaStream([videoTrack, audioTrack]);
                } else {
                    combinedStream = canvasStream;
                }

                // Bitrate optimized for smooth 4K capturing (12 Mbps)
                let options = { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 12000000 }; 
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm' };
                }

                try {
                    mediaRecorder = new MediaRecorder(combinedStream, options);
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) recordedChunks.push(e.data);
                    };
                    mediaRecorder.onstop = saveRecording;
                    mediaRecorder.start();

                    isRecording = true;
                    if (btn && txt) {
                        btn.className = "px-3.5 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-xs font-bold transition flex items-center gap-1.5 shadow-lg animate-pulse";
                        txt.textContent = "Recording (Click to stop)";
                    }
                    
                    // Automatically trigger BGM on record click to keep music sync!
                    const player = document.getElementById('bgm-player');
                    if (player && player.paused) {
                        toggleBGM();
                    }
                } catch (err) {
                    console.error("Recording initialization failed:", err);
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                if (btn && txt) {
                    btn.className = "px-3.5 py-1.5 bg-rose-600 hover:bg-rose-500 text-white rounded-lg text-xs font-bold transition flex items-center gap-1.5 shadow-lg";
                    txt.textContent = "Browser Record (With Audio)";
                }
            }
        }

        function saveRecording() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });

            // If exposed Node.js bridge exists (GitHub Actions automated environment)
            if (window.saveVideoChunkToDisk) {
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = function() {
                    const base64data = reader.result.split(',')[1];
                    window.saveVideoChunkToDisk(base64data);
                };
                return;
            }

            // Fallback for standard manual local downloads
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            document.body.appendChild(a);
            a.style = 'display: none';
            a.href = url;
            a.download = `beat_the_keeper_4k_studio.webm`;
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
